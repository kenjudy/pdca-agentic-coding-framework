name: Release PDCA Skill

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: uv sync --extra test --extra lint
        working-directory: skill

      - name: Run tests
        run: bash skill/run-tests.sh

      - name: Build skill package
        run: bash skill/build-skill.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: skill/pdca-framework.skill
          generate_release_notes: false
          body: |
            ## Install via Claude UI

            1. Download `pdca-framework.skill` below
            2. Go to claude.ai → **Customize** → **Skills** → **Add Skill**
            3. Upload the file and toggle it on

            **pdca-framework.skill** — TDD-disciplined AI-assisted code generation with Beads integration.

            To generate a custom AI workflow skill for any domain, see [human-directed-ai-workflow-builder](https://github.com/kenjudy/human-directed-ai-workflow-builder).

            See the [README](https://github.com/kenjudy/pdca-agentic-coding-framework/blob/main/skill/README.md) for full documentation.
